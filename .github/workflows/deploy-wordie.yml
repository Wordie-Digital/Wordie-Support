name: Deploy Wordie Theme to WP Engine

on:
  push:
    branches:
      - main        # → Production
      - staging     # → Staging
      - development # → Development
    paths:
      - 'wordie/**'
      - '.github/workflows/deploy-wordie.yml'

concurrency:
  group: deploy-wordie-${{ github.ref_name }}
  cancel-in-progress: true

env:
  PHP_VERSION:  "8.2"
  NODE_VERSION: "20"
  THEME_DIR:    wordie

jobs:
  # ---------------------------------------------------------------------------
  # 1. Lint — PHP syntax + JS
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (PHP + JS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: phpcs
          coverage: none

      - name: PHP CodeSniffer (WordPress coding standards)
        run: |
          phpcs \
            --standard=WordPress \
            --extensions=php \
            --ignore=vendor,node_modules \
            --report=summary \
            ${{ env.THEME_DIR }}/ || true

      - name: PHP syntax check
        run: |
          find ${{ env.THEME_DIR }} -name "*.php" | xargs -I{} php -l {}

      - name: ACF JSON validation
        run: |
          find ${{ env.THEME_DIR }}/acf-fields -name "*.json" | while read f; do
            python3 -m json.tool "$f" > /dev/null && echo "✓ $f" || (echo "✗ $f" && exit 1)
          done

  # ---------------------------------------------------------------------------
  # 2. Smoke test — verify required theme files exist
  # ---------------------------------------------------------------------------
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required theme files
        run: |
          REQUIRED=(
            "${{ env.THEME_DIR }}/style.css"
            "${{ env.THEME_DIR }}/functions.php"
            "${{ env.THEME_DIR }}/index.php"
            "${{ env.THEME_DIR }}/header.php"
            "${{ env.THEME_DIR }}/footer.php"
            "${{ env.THEME_DIR }}/inc/block-registration.php"
            "${{ env.THEME_DIR }}/acf-fields/hero-banner.json"
            "${{ env.THEME_DIR }}/blocks/hero-banner/template.php"
          )
          for f in "${REQUIRED[@]}"; do
            if [ -f "$f" ]; then
              echo "✓ $f"
            else
              echo "✗ Missing: $f" && exit 1
            fi
          done

  # ---------------------------------------------------------------------------
  # 3. Deploy — push theme to WP Engine environment
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: smoke-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine WP Engine environment
        run: |
          if   [[ "${{ github.ref_name }}" == "main"        ]]; then echo "WPE_ENV=${{ secrets.WPE_WORDIE_ENV_PRODUCTION }}"   >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" == "staging"     ]]; then echo "WPE_ENV=${{ secrets.WPE_WORDIE_ENV_STAGING }}"     >> $GITHUB_ENV
          else                                                        echo "WPE_ENV=${{ secrets.WPE_WORDIE_ENV_DEVELOPMENT }}" >> $GITHUB_ENV
          fi

      - name: Deploy to WP Engine via SSH Git push
        uses: wpengine/github-action-wpe-site-deploy@v3
        with:
          WPE_SSHG_KEY_PRIVATE: ${{ secrets.WPE_SSH_KEY_PRIVATE }}
          WPE_ENV:              ${{ env.WPE_ENV }}
          SRC_PATH:             "wordie/"
          REMOTE_PATH:          "wp-content/themes/wordie/"
          CACHE_CLEAR:          true
          FLAGS: >
            --exclude=".git"
            --exclude=".github"
            --exclude="node_modules"
            --exclude=".gitignore"
            --exclude="package*.json"
            --exclude="*.md"
            --exclude=".phpcs.xml"
            --exclude=".eslintrc*"
            --exclude="llms.txt"

      - name: Smoke test — HTTP 200
        run: |
          URL="https://${{ env.WPE_ENV }}.wpengine.com"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test FAILED: $URL returned HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test passed: $URL returned HTTP 200"

# ── Required GitHub Secrets ────────────────────────────────────────────────
# WPE_SSH_KEY_PRIVATE          — WP Engine SSH private key (PEM, no passphrase)
# WPE_WORDIE_ENV_PRODUCTION    — WP Engine environment name for production
# WPE_WORDIE_ENV_STAGING       — WP Engine environment name for staging
# WPE_WORDIE_ENV_DEVELOPMENT   — WP Engine environment name for development
